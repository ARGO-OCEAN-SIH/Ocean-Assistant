<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ocean Voice Assistant</title>
</head>
<body>
  <h1>Ocean Voice Assistant</h1>
  <button id="startBtn">Start Streaming</button>
  <button id="stopBtn">Stop Streaming</button>
  <div id="log"></div>

  <script>
    const logDiv = document.getElementById("log");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    let ws;

    function log(msg) {
      logDiv.innerHTML += msg + "<br/>";
      console.log(msg);
    }

    function connectWebSocket() {
      ws = new WebSocket("ws://localhost:8000/ws/voice");

      ws.onopen = () => log("✅ WebSocket connected");
      ws.onclose = () => log("❌ WebSocket disconnected");
      ws.onmessage = (event) => {
        log("📢 " + event.data);
      };
      ws.onerror = (err) => log("⚠️ WebSocket error: " + err);
    }

    startBtn.addEventListener("click", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        connectWebSocket();
        ws.onopen = () => {
          ws.send(JSON.stringify({ action: "start_stream" }));
          log("▶ Sent start_stream");
        };
      } else {
        ws.send(JSON.stringify({ action: "start_stream" }));
        log("▶ Sent start_stream");
      }
    });
