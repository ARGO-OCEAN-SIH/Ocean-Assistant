<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - My Site</title>
    <style>
        /* Reset default margins */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f9f9f9;
    color: #333;
}

/* Navbar */
nav {
    background-color: #2c3e50;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 30px;
}

nav .logo {
    font-size: 22px;
    font-weight: bold;
}

nav .nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav .nav-links li a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

nav .nav-links li a:hover {
    color: #1abc9c;
}

/* Hero Section */
.hero {
    text-align: center;
    padding: 80px 20px;
    background: linear-gradient(to right, #1abc9c, #16a085);
    color: white;
}

.hero h1 {
    font-size: 40px;
    margin-bottom: 15px;
}

.hero p {
    font-size: 18px;
}

    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <div class="logo">MySite</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="{% url 'backend:register' %}">Register</a></li>
            <li><a href="{% url 'backend:login' %}">Login</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Welcome to MySite</h1>
        <p>Explore ocean of possibilities with Django 🚀</p>
          <!-- Floating Voice Button -->
  <button id="voiceBtn" class="voice-btn">
    🎤click
  </button>
<script>
let ws;
let mediaRecorder;
let isRecording = false;
const voiceBtn = document.getElementById("voiceBtn");

voiceBtn.addEventListener("click", () => {
  if (!isRecording) {
    startRecording();
  } else {
    stopRecording();
  }
});

async function startRecording() {
  ws = new WebSocket("ws://localhost:8000/ws/audio/");

  ws.onopen = () => {
    console.log("✅ WebSocket connected");
    ws.send(JSON.stringify({ action: "start_stream", format: "webm" }));
  };

  ws.onmessage = (event) => {
    console.log("📩 From server:", event.data);
    const msg = JSON.parse(event.data);
    if (msg.status === "transcription") {
      alert("📝 Transcribed: " + msg.text);
    }
  };

  ws.onclose = () => {
    console.log("❌ WebSocket closed");
  };

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm; codecs=opus" });

  mediaRecorder.ondataavailable = async (e) => {
    console.log("🎤 Chunk size:", e.data.size);
    if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
      const buffer = await e.data.arrayBuffer();
      ws.send(buffer); // send raw binary audio
    }
  };

  mediaRecorder.start(250);
  isRecording = true;
  voiceBtn.classList.add("recording");
  console.log("🎙️ Recording started");
}

function stopRecording() {
  if (mediaRecorder) {
    mediaRecorder.stop();
  }
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: "stop_stream" }));
    // do NOT close immediately — wait for server transcription response
  }
  isRecording = false;
  voiceBtn.classList.remove("recording");
  console.log("🛑 Recording stopped");
}
</script>
